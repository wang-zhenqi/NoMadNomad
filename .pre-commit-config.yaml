# pre-commit hooks - 代码提交前检查
# 安装: poetry run pre-commit install
# 手动运行: poetry run pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: trailing-whitespace
        name: trailing-whitespace
        entry: poetry run python -m pre_commit_hooks.trailing_whitespace_fixer
        language: system
        types: [text]

      - id: end-of-file-fixer
        name: end-of-file-fixer
        entry: poetry run python -m pre_commit_hooks.end_of_file_fixer
        language: system
        types: [text]

      - id: check-yaml
        name: check-yaml
        entry: poetry run python -m pre_commit_hooks.check_yaml
        language: system
        types: [yaml]

      - id: check-json
        name: check-json
        entry: poetry run python -m pre_commit_hooks.check_json
        language: system
        types: [json]

      - id: check-toml
        name: check-toml
        entry: poetry run python -m pre_commit_hooks.check_toml
        language: system
        types: [toml]

      - id: check-added-large-files
        name: check-added-large-files
        entry: poetry run python -m pre_commit_hooks.check_added_large_files
        language: system
        args: ["--maxkb=1000"]

      - id: check-merge-conflict
        name: check-merge-conflict
        entry: poetry run python -m pre_commit_hooks.check_merge_conflict
        language: system

      - id: debug-statements
        name: debug-statements
        entry: poetry run python -m pre_commit_hooks.debug_statement_hook
        language: system
        types: [python]

      # GitGuardian - 提交前扫描密钥/敏感信息（需设置环境变量 GITGUARDIAN_API_KEY）
      - id: ggshield
        name: ggshield
        entry: poetry run ggshield secret scan pre-commit
        language: system
        stages: [pre-commit]

      - id: black
        name: black
        entry: poetry run black
        language: system
        files: ^(src|streamlit_app|tests)/

      - id: isort
        name: isort
        entry: poetry run isort
        language: system
        args: ["--profile", "black"]
        files: ^(src|streamlit_app|tests)/

      - id: mypy
        name: mypy
        entry: poetry run mypy
        language: system
        args: [--config=pyproject.toml]
        files: ^src/nomadnomad/

ci:
  autofix_commit_msg: "style: auto-fix by pre-commit"
  autoupdate_commit_msg: "chore: pre-commit autoupdate"
